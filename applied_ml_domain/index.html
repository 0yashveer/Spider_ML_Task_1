<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Astron</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-grad: linear-gradient(135deg,
        #dcd8f0 0%, #e8d4e8 20%, #f0d0e8 35%,
        #e8d8f0 50%, #d8ddf5 65%, #cdd4f0 80%, #d4d8f2 100%);
      --glass: rgba(255,255,255,0.68);
      --glass-border: rgba(200,195,230,0.5);
      --text-dark: #1a1a2e;
      --text-mid: #3a3a5e;
      --text-light: #a8a4c0;
      --chip-bg: rgba(255,255,255,0.62);
    }

    html, body {
      height: 100%;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: var(--bg-grad);
      background-attachment: fixed;
      overflow: hidden;
    }

    /* ── Animated blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      width: 420px; height: 360px;
      top: 28%; left: 18%;
      background: radial-gradient(ellipse, rgba(230,180,220,0.45) 0%, transparent 70%);
      animation: blobMove1 9s ease-in-out infinite alternate;
    }
    .blob-2 {
      width: 380px; height: 320px;
      top: 22%; right: 14%;
      background: radial-gradient(ellipse, rgba(180,200,245,0.42) 0%, transparent 70%);
      animation: blobMove2 11s ease-in-out infinite alternate;
    }
    @keyframes blobMove1 { to { transform: translate(30px,-20px) scale(1.08); } }
    @keyframes blobMove2 { to { transform: translate(-25px,25px) scale(1.06); } }

    /* ── Layout ── */
    .app {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    nav {
      flex-shrink: 0;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(180,170,210,0.25);
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
    }
    .logo {
      font-weight: 700;
      font-size: 17px;
      letter-spacing: 0.02em;
      color: var(--text-dark);
    }

    /* ── LANDING STATE ── */
    #landing {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 180px;
      transition: opacity 0.3s ease;
    }
    .sparkle {
      margin-bottom: 16px;
      animation: sparklePulse 3s ease-in-out infinite;
      color: var(--text-dark);
    }
    @keyframes sparklePulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.72; transform:scale(1.08); }
    }
    .hero-text {
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: var(--text-dark);
    }

    /* ── CHAT STATE ── */
    #chatArea {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .messages-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 28px 48px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }
    .messages-scroll::-webkit-scrollbar { width: 4px; }
    .messages-scroll::-webkit-scrollbar-thumb {
      background: rgba(160,150,200,0.35);
      border-radius: 4px;
    }

    /* User bubble */
    .msg-user {
      align-self: flex-end;
      background: rgba(255,255,255,0.75);
      border: 1.5px solid rgba(200,195,230,0.55);
      border-radius: 22px;
      padding: 11px 22px;
      font-size: 14px;
      color: var(--text-dark);
      max-width: 55%;
      backdrop-filter: blur(8px);
      animation: fadeSlideIn 0.3s ease;
    }

    /* AI bubble */
    .msg-ai-wrap {
      align-self: flex-start;
      max-width: 58%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fadeSlideIn 0.35s ease;
    }
    .msg-ai {
      background: rgba(255,255,255,0.78);
      border: 1.5px solid rgba(200,195,230,0.5);
      border-radius: 18px;
      padding: 20px 24px;
      font-size: 14px;
      line-height: 1.65;
      color: var(--text-mid);
      backdrop-filter: blur(10px);
      box-shadow: 0 2px 20px rgba(150,140,200,0.1);
    }
    .msg-ai.typing {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 18px 24px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-light);
      animation: dotBounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce {
      0%,80%,100% { transform: translateY(0); opacity:0.5; }
      40%          { transform: translateY(-6px); opacity:1; }
    }

    /* Sources */
    .sources-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .sources-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12.5px;
      color: var(--text-mid);
      font-weight: 500;
    }
    .source-chip {
      font-size: 11.5px;
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(180,170,220,0.45);
      border-radius: 20px;
      padding: 3px 11px;
      color: var(--text-mid);
      cursor: default;
      transition: background 0.2s;
    }
    .source-chip:hover { background: rgba(255,255,255,0.88); }

    @keyframes fadeSlideIn {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── BOTTOM SECTION (shared) ── */
    .bottom-section {
      flex-shrink: 0;
      padding: 12px 0 32px;
    }

    .suggestions {
      display: flex;
      justify-content: center;
      gap: 14px;
      padding: 0 24px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    #landing .suggestions { margin-bottom: 20px; }

    .chip {
      background: var(--chip-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 11px 20px;
      font-size: 13.5px;
      color: var(--text-mid);
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      white-space: nowrap;
    }
    .chip:hover {
      background: rgba(255,255,255,0.88);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(160,140,200,0.2);
    }

    /* Input bar */
    .input-wrapper {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .input-bar {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 13px 14px 13px 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 2px 20px rgba(150,140,200,0.12);
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .input-bar:focus-within {
      box-shadow: 0 4px 28px rgba(150,140,200,0.22);
      border-color: rgba(180,160,220,0.6);
    }
    .input-bar input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 14px;
      color: var(--text-dark);
      font-family: inherit;
    }
    .input-bar input::placeholder { color: var(--text-light); }
    .send-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 6px;
      color: #9090b0;
      display: flex;
      align-items: center;
      transition: color 0.2s, transform 0.15s;
    }
    .send-btn:hover { color: #5050a0; transform: scale(1.1); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="app">

  <!-- Navbar -->
  <nav><span class="logo">Astron</span></nav>

  <!-- ── LANDING STATE ── -->
  <div id="landing">
    <div class="sparkle">
      <svg width="44" height="44" viewBox="0 0 48 48" fill="none">
        <path d="M28 10L29.5 18L37 20L29.5 22L28 30L26.5 22L19 20L26.5 18Z" fill="#1a1a2e"/>
        <path d="M16 28L17 32L21 33L17 34L16 38L15 34L11 33L15 32Z" fill="#1a1a2e"/>
      </svg>
    </div>
    <p class="hero-text">Ask ME anything...</p>

    <!-- Suggestion chips shown on landing -->
    <div class="suggestions" style="margin-top:48px;">
      <div class="chip" onclick="fillInput(this)">How does LoRA reduce training cost?</div>
      <div class="chip" onclick="fillInput(this)">How does self-attention differ from recurrence?</div>
      <div class="chip" onclick="fillInput(this)">Difference between BERT and GPT</div>
    </div>
  </div>

  <!-- ── CHAT STATE ── -->
  <div id="chatArea">
    <div class="messages-scroll" id="messagesScroll"></div>
  </div>

  <!-- ── BOTTOM INPUT (always visible) ── -->
  <div class="bottom-section">
    <div class="input-wrapper">
      <div class="input-bar">
        <input type="text" id="chatInput"
               placeholder="throw anything at me..."
               autocomplete="off" />
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M5 12H19M19 12L13 6M19 12L13 18"
                  stroke="currentColor" stroke-width="1.8"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

</div>

<script>
  const API_URL = "http://127.0.0.1:5000/chat"; // Flask backend

  const landingEl   = document.getElementById("landing");
  const chatAreaEl  = document.getElementById("chatArea");
  const scrollEl    = document.getElementById("messagesScroll");
  const inputEl     = document.getElementById("chatInput");
  const sendBtn     = document.getElementById("sendBtn");

  let chatStarted = false;

  function fillInput(el) {
    inputEl.value = el.textContent.trim();
    inputEl.focus();
  }

  function switchToChat() {
    if (!chatStarted) {
      chatStarted = true;
      landingEl.style.display = "none";
      chatAreaEl.style.display = "flex";
    }
  }

  function appendUserBubble(text) {
    const el = document.createElement("div");
    el.className = "msg-user";
    el.textContent = text;
    scrollEl.appendChild(el);
    scrollEl.scrollTop = scrollEl.scrollHeight;
  }

  function appendTypingIndicator() {
    const wrap = document.createElement("div");
    wrap.className = "msg-ai-wrap";
    wrap.id = "typingIndicator";
    wrap.innerHTML = `
      <div class="msg-ai typing">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>`;
    scrollEl.appendChild(wrap);
    scrollEl.scrollTop = scrollEl.scrollHeight;
  }

  function removeTypingIndicator() {
    const el = document.getElementById("typingIndicator");
    if (el) el.remove();
  }

  function appendAIBubble(answer, sources) {
    const wrap = document.createElement("div");
    wrap.className = "msg-ai-wrap";

    // Answer card
    const card = document.createElement("div");
    card.className = "msg-ai";
    // Render newlines
    card.innerHTML = answer.replace(/\n/g, "<br>");
    wrap.appendChild(card);

    // Sources row
    if (sources && sources.length > 0) {
      const srcRow = document.createElement("div");
      srcRow.className = "sources-row";

      // Sparkle label
      srcRow.innerHTML = `
        <span class="sources-label">
          <svg width="14" height="14" viewBox="0 0 48 48" fill="none">
            <path d="M28 10L29.5 18L37 20L29.5 22L28 30L26.5 22L19 20L26.5 18Z" fill="#3a3a5e"/>
            <path d="M16 28L17 32L21 33L17 34L16 38L15 34L11 33L15 32Z" fill="#3a3a5e"/>
          </svg>
          Read related Articles
        </span>`;

      sources.forEach(src => {
        const chip = document.createElement("span");
        chip.className = "source-chip";
        chip.title = `Page ${src.page_number}`;
        chip.textContent = `${src.file_name} · p.${src.page_number}`;
        srcRow.appendChild(chip);
      });

      wrap.appendChild(srcRow);
    }

    scrollEl.appendChild(wrap);
    scrollEl.scrollTop = scrollEl.scrollHeight;
  }

  async function sendMessage() {
    const query = inputEl.value.trim();
    if (!query || sendBtn.disabled) return;

    switchToChat();

    inputEl.value = "";
    sendBtn.disabled = true;

    appendUserBubble(query);
    appendTypingIndicator();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query })
      });

      const data = await res.json();
      removeTypingIndicator();

      if (data.error) {
        appendAIBubble("⚠️ " + data.error, []);
      } else {
        appendAIBubble(data.answer, data.sources);
      }
    } catch (err) {
      removeTypingIndicator();
      appendAIBubble("⚠️ Could not connect to the server. Make sure the Flask backend is running on port 5000.", []);
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });
</script>

</body>
</html>
